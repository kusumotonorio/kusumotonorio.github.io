<p>釣れた！　前の週末にも地元でチャレンジしたのだが相手にされず、北陸に遠征。この日も結局この１杯のみで、なかなか経験値は上がらない。刺身を造るのは面倒なので、バター炒めでいただきました。春アオリはでかいけど身が硬くなるらしいので、食べるのにはこのくらいが良いのかな。小さいと罪悪感があるし。</p>
